name: AI Code Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai_review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          echo "Base ref: ${{ github.base_ref }}"
          echo "Head ref: ${{ github.head_ref }}"

          # Явно подтягиваем обе ветки
          git fetch origin ${{ github.base_ref }}
          git fetch origin ${{ github.head_ref }}

          # Пытаемся построить diff между двумя удалёнными ветками
          if git merge-base --is-ancestor origin/${{ github.base_ref }} origin/${{ github.head_ref }} || \
             git merge-base --is-ancestor origin/${{ github.head_ref }} origin/${{ github.base_ref }}; then
            echo "Branches have a merge base, using triple-dot diff"
            git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > diff.txt
          else
            echo "No merge base, using full diff between branches"
            git diff origin/${{ github.base_ref }} origin/${{ github.head_ref }} > diff.txt
          fi

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Ask DeepSeek for review
        id: ask_deepseek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "DEEPSEEK_API_KEY is not set"
            exit 1
          fi

          DIFF_CONTENT=$(cat << 'EOF'
${{ steps.diff.outputs.diff }}
EOF
)

