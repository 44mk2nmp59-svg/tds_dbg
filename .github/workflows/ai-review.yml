name: AI Code Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai_review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          echo "Base ref: ${{ github.base_ref }}"
          echo "Head ref: ${{ github.head_ref }}"

          git fetch origin ${{ github.base_ref }}
          git fetch origin ${{ github.head_ref }}

          if git merge-base --is-ancestor origin/${{ github.base_ref }} origin/${{ github.head_ref }} || \
             git merge-base --is-ancestor origin/${{ github.head_ref }} origin/${{ github.base_ref }}; then
            echo "Branches have a merge base, using triple-dot diff"
            git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > diff.txt
          else
            echo "No merge base, using full diff between branches"
            git diff origin/${{ github.base_ref }} origin/${{ github.head_ref }} > diff.txt
          fi

          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Ask DeepSeek for review
        id: ask_deepseek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "${DEEPSEEK_API_KEY}" ]; then
            echo "DEEPSEEK_API_KEY is not set"
            exit 1
          fi

          DIFF_CONTENT=$(cat << 'EOF'${{ steps.diff.outputs.diff }}EOF)

          DIFF_TRIMMED=$(printf "%s" "$DIFF_CONTENT" | head -c 24000)

          PAYLOAD=$(jq -n --arg diff "$DIFF_TRIMMED" '
            {
              model: "deepseek-chat",
              messages: [
                {
                  role: "system",
                  content: "You are an experienced code reviewer. Review the following diff and provide concise, actionable feedback."
                },
                {
                  role: "user",
                  content: ("Here is the Git diff:\n\n" + $diff)
                }
              ]
            }
          ')

          RESPONSE=$(curl -sS https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -d "$PAYLOAD")

          echo "$RESPONSE" > deepseek_response.json

          REVIEW_TEXT=$(jq -r '.choices[0].message.content' deepseek_response.json)

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_BODY="${{ steps.ask_deepseek.outputs.review }}"

          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY="DeepSeek не вернул содержимое ревью или произошла ошибка при разборе ответа."
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}

          jq -n --arg body "$REVIEW_BODY" '
            { body: $body }
          ' > comment.json

          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
            -d @comment.json
